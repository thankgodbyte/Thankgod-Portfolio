<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Coming Soon</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url("images/bg-image/bg-10.jpg") center/cover no-repeat;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 500px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 20px;
      width: 160px;
      border-radius: 8px;
      border: none;
      color: white;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #6366f1, #a855f7);
    }

    .small-text {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚧 CV Coming Soon</h1>
    <p>
      I’m currently working on my professional CV.<br>
      It will be available for download very soon.
    </p>

    <a href="index.html">
      <button class="btn">Back to Home</button>
    </a>

    <div class="small-text">
      Thanks for your patience 🙏
    </div>
  </div>

</body>
</html>
